name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'site/data/**'   # the daily cron's auto-commit — don't re-run tests for a data update
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v
