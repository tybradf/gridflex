name: Ingest

on:
  schedule:
    - cron: '17 6 * * *'   # daily, 06:17 UTC — arbitrary off-peak minute
  workflow_dispatch: {}     # allows manual triggering from the Actions tab

permissions:
  contents: write   # required to create/upload release assets, and to push the site-data commit
  actions: write     # required to explicitly trigger pages.yml (see step below)

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Download previous data snapshot
        # The DB is persisted as a Release asset, NOT committed to git — a
        # daily-growing binary in git history would bloat the repo forever
        # (learned this the hard way locally — see Session 2 git push failure).
        # First run ever: this will fail (no release exists yet) — that's
        # expected; see the README for the one-time manual seed step.
        run: |
          mkdir -p data
          gh release download data-latest --pattern 'gridflex.duckdb' --dir data --clobber \
            || echo "No previous snapshot found (expected on the very first run)."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ingest latest data
        run: |
          if [ -f data/gridflex.duckdb ]; then
            echo "Snapshot found — incremental ingest via watermark."
            python -m gridflex.cli ingest
          else
            echo "!!! No snapshot downloaded. Falling back to a 30-day pull."
            echo "!!! For full history, seed the release manually — see README."
            python -m gridflex.cli ingest --start "$(date -u -d '30 days ago' +%Y-%m-%dT%H)"
          fi
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}

      - name: Generate live forecast
        # continue-on-error: a transient Open-Meteo hiccup shouldn't block
        # the core demand pipeline from deploying — but this step still
        # shows as failed (⚠️) in the Actions UI, so it's never silent.
        continue-on-error: true
        run: python -m gridflex.cli forecast

      - name: Regenerate site data
        run: python -m gridflex.features.export

      - name: Commit updated site data
        # site/data/latest.json IS committed to git (unlike the DB) — it's
        # small and gets overwritten in place, not grown, so no bloat risk.
        # This is also what makes Pages "live": Pages serves whatever's in
        # git, so the JSON has to land there for the site to actually update.
        id: commit_site_data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/latest.json
          if git diff --staged --quiet; then
            echo "No change in site data — skipping commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Auto-update site data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages redeploy
        # IMPORTANT: a push made with the default GITHUB_TOKEN (as above)
        # does NOT trigger other workflows' `on: push` — this is a deliberate
        # GitHub restriction to prevent infinite workflow-chaining loops. So
        # pages.yml would silently never redeploy on the daily cron without
        # this explicit trigger. An explicit `gh workflow run` call is exempt
        # from that restriction (it's not implicit event-chaining).
        if: steps.commit_site_data.outputs.changed == 'true'
        run: gh workflow run pages.yml --ref main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload updated data snapshot
        run: gh release upload data-latest data/gridflex.duckdb --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
